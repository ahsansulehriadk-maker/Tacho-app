<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TachoMaster Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { user-select: none; -webkit-tap-highlight-color: transparent; }
        .active-status { border-color: #3b82f6; background-color: #1e293b; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        #speed-val { font-variant-numeric: tabular-nums; }
        .progress-bar { transition: width 0.5s ease; }
    </style>
</head>
<body class="bg-black text-slate-100 p-4 min-h-screen pb-20">
    <div class="max-w-md mx-auto">
        
        <div class="flex justify-between items-center mb-4 px-2">
            <h1 class="text-xl font-black tracking-tighter text-blue-500">TACHO<span class="text-white">PRO</span></h1>
            <div id="connection-dot" class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
        </div>

        <div class="bg-slate-900 rounded-3xl p-6 mb-4 border border-slate-800 flex justify-between items-end shadow-xl">
            <div>
                <div class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1">Live Speed</div>
                <div class="flex items-baseline">
                    <span id="speed-val" class="text-7xl font-black text-white">0</span>
                    <span class="text-sm ml-1 text-slate-500 font-bold uppercase">mph</span>
                </div>
            </div>
            <div class="text-right">
                <div class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1">Shift Drive</div>
                <div id="drive-timer" class="text-4xl font-mono font-bold text-yellow-500">00:00</div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-6">
            <button onclick="setStatus('driving')" id="btn-driving" class="bg-slate-900 p-4 rounded-2xl flex flex-col items-center border border-slate-800 transition-all active:scale-95">
                <span class="text-2xl">🚛</span>
                <span class="text-[10px] mt-2 font-bold uppercase text-slate-400">Drive</span>
            </button>
            <button onclick="setStatus('work')" id="btn-work" class="bg-slate-900 p-4 rounded-2xl flex flex-col items-center border border-slate-800 transition-all active:scale-95">
                <span class="text-2xl">🛠️</span>
                <span class="text-[10px] mt-2 font-bold uppercase text-slate-400">Other Work</span>
            </button>
            <button onclick="setStatus('rest')" id="btn-rest" class="bg-slate-900 p-4 rounded-2xl flex flex-col items-center border border-slate-800 transition-all active:scale-95">
                <span class="text-2xl">🛌</span>
                <span class="text-[10px] mt-2 font-bold uppercase text-slate-400">Rest</span>
            </button>
        </div>

        <div class="bg-slate-900 rounded-2xl p-4 mb-4 border border-slate-800">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-bold text-slate-500 uppercase">Split Break Progress (45m)</span>
                <span id="break-status" class="text-[10px] font-bold bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded">Tracking</span>
            </div>
            <div class="flex gap-3">
                <div class="flex-1">
                    <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden mb-2">
                        <div id="bar-1" class="h-full bg-green-500 progress-bar" style="width: 0%"></div>
                    </div>
                    <p class="text-[10px] text-slate-400 text-center">Pt. 1: <span id="b1-val" class="font-bold text-white">0m</span>/15m</p>
                </div>
                <div class="flex-1">
                    <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden mb-2">
                        <div id="bar-2" class="h-full bg-green-500 progress-bar" style="width: 0%"></div>
                    </div>
                    <p class="text-[10px] text-slate-400 text-center">Pt. 2: <span id="b2-val" class="font-bold text-white">0m</span>/30m</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Latest Finish</p>
                <p id="latest-finish" class="text-xl font-black text-red-500">--:--</p>
                <select id="spread-type" onchange="updateCalculations()" class="mt-2 bg-slate-800 text-[9px] font-bold rounded p-1 w-full border-none outline-none">
                    <option value="13">13h Spread</option>
                    <option value="15">15h Spread</option>
                </select>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Earliest Start</p>
                <p id="next-start" class="text-xl font-black text-green-500">--:--</p>
                <div class="mt-2 text-[9px] text-slate-500 font-bold uppercase py-1">After Legal Rest</div>
            </div>
        </div>

        <div class="bg-blue-600/10 border border-blue-500/20 rounded-2xl p-4">
            <p class="text-[10px] font-bold text-blue-500 uppercase mb-2">Weekly Summary (Mon-Sun)</p>
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-2xl font-black" id="weekly-total">0.0h</p>
                    <p class="text-[9px] text-slate-500 uppercase font-bold tracking-tighter">Total Drive This Week</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Limit: 56h / 90h</p>
                </div>
            </div>
        </div>

        <button onclick="resetAll()" class="w-full mt-10 py-4 text-slate-700 text-[10px] font-bold uppercase tracking-[0.3em]">Clear All & New Week</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // State Variables (Loaded from LocalStorage)
        let state = JSON.parse(localStorage.getItem('tachoState')) || {
            shiftStart: null,
            driveSecs: 0,
            weeklySecs: 0,
            breakPart1: 0,
            breakPart2: 0,
            currentStatus: 'rest',
            lastTick: Date.now()
        };

        let timer;
        let currentRestMins = 0;

        // Initialize
        window.onload = () => {
            if (state.shiftStart) {
                state.shiftStart = new Date(state.shiftStart);
                updateCalculations();
                updateDriveDisplay();
                updateWeeklyDisplay();
            }
            setStatus(state.currentStatus);
            startGlobalTimer();
        };

        // GPS Speedo
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((pos) => {
                const speed = Math.round((pos.coords.speed || 0) * 2.23694);
                document.getElementById('speed-val').innerText = Math.max(0, speed);
                if (speed > 4 && state.currentStatus !== 'driving') setStatus('driving');
            }, null, { enableHighAccuracy: true });
        }

        function save() {
            localStorage.setItem('tachoState', JSON.stringify(state));
        }

        function setStatus(s) {
            if (!state.shiftStart && s !== 'rest') {
                state.shiftStart = new Date();
                save();
                updateCalculations();
            }

            // Finalize rest if we switch away
            if (state.currentStatus === 'rest' && s !== 'rest') {
                finalizeBreak();
            }

            state.currentStatus = s;
            save();
            updateUI();
            tg.HapticFeedback.selectionChanged();
        }

        function startGlobalTimer() {
            timer = setInterval(() => {
                const now = Date.now();
                const delta = Math.floor((now - state.lastTick) / 1000);
                state.lastTick = now;

                if (state.currentStatus === 'driving') {
                    state.driveSecs += delta;
                    state.weeklySecs += delta;
                    updateDriveDisplay();
                    updateWeeklyDisplay();
                } else if (state.currentStatus === 'rest') {
                    currentRestMins += (delta / 60);
                    updateBreakUI();
                }
                
                if (state.driveSecs >= 16200 && state.driveSecs < 16210) {
                    tg.showAlert("4.5H LIMIT REACHED. Take your 45m break.");
                }
                save();
            }, 1000);
        }

        function finalizeBreak() {
            if (currentRestMins >= 15 && state.breakPart1 === 0) {
                state.breakPart1 = Math.floor(currentRestMins);
            } else if (currentRestMins >= 30 && state.breakPart1 > 0) {
                state.breakPart2 = Math.floor(currentRestMins);
                state.driveSecs = 0; // Reset continuous drive
            }
            currentRestMins = 0;
            save();
        }

        function updateBreakUI() {
            const b1Percent = state.breakPart1 >= 15 ? 100 : (state.currentStatus === 'rest' && state.breakPart1 === 0 ? Math.min(100, (currentRestMins/15)*100) : 0);
            const b2Percent = state.breakPart2 >= 30 ? 100 : (state.currentStatus === 'rest' && state.breakPart1 >= 15 ? Math.min(100, (currentRestMins/30)*100) : 0);
            
            document.getElementById('bar-1').style.width = b1Percent + '%';
            document.getElementById('bar-2').style.width = b2Percent + '%';
            
            document.getElementById('b1-val').innerText = (state.breakPart1 || (state.breakPart1 === 0 && state.currentStatus === 'rest' ? Math.floor(currentRestMins) : 0)) + 'm';
            document.getElementById('b2-val').innerText = (state.breakPart2 || (state.breakPart1 >= 15 && state.currentStatus === 'rest' ? Math.floor(currentRestMins) : 0)) + 'm';
            
            if (state.breakPart1 >= 15 && state.breakPart2 >= 30) {
                document.getElementById('break-status').innerText = "CLEARED";
                document.getElementById('break-status').className = "text-[10px] font-bold bg-green-500/20 text-green-400 px-2 py-0.5 rounded";
            }
        }

        function updateDriveDisplay() {
            const h = Math.floor(state.driveSecs / 3600);
            const m = Math.floor((state.driveSecs % 3600) / 60);
            document.getElementById('drive-timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        }

        function updateWeeklyDisplay() {
            const hours = (state.weeklySecs / 3600).toFixed(1);
            document.getElementById('weekly-total').innerText = hours + 'h';
        }

        function updateCalculations() {
            if (!state.shiftStart) return;
            const spread = parseInt(document.getElementById('spread-type').value);
            const finish = new Date(state.shiftStart.getTime() + spread * 60 * 60 * 1000);
            const rest = (spread === 13) ? 11 : 9;
            const next = new Date(finish.getTime() + rest * 60 * 60 * 1000);

            document.getElementById('latest-finish').innerText = formatTime(finish);
            document.getElementById('next-start').innerText = formatTime(next);
        }

        function updateUI() {
            ['driving', 'work', 'rest'].forEach(id => {
                const btn = document.getElementById('btn-'+id);
                btn.classList.toggle('active-status', state.currentStatus === id);
                btn.querySelector('span:last-child').classList.toggle('text-blue-400', state.currentStatus === id);
            });
        }

        function formatTime(d) { return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false}); }
        
        function resetAll() {
            tg.showConfirm("This will clear all shift and weekly logs. Continue?", (ok) => {
                if(ok) { localStorage.clear(); location.reload(); }
            });
        }
    </script>
</body>
</html>
