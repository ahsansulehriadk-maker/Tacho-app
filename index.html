<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Work Log</title>

<!-- Telegram API -->
https://telegram.org/js/telegram-web-app.js</script>
<!-- jsPDF -->
https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js</script>

<style>
/* ======================
   iOS 17 THEME
====================== */
:root {
  --bg: #f2f2f7;
  --card: rgba(255,255,255,0.85);
  --text: #000;
  --accent: #007aff;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000;
    --card: rgba(28,28,30,0.9);
    --text: #fff;
    --accent: #0a84ff;
  }
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro";
}

.app {
  max-width: 420px;
  margin: auto;
  padding: 16px;
}

h1 {
  text-align: center;
}

.card {
  background: var(--card);
  backdrop-filter: blur(20px);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

label {
  display: block;
  margin-top: 10px;
  font-size: 14px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

button {
  background: var(--accent);
  color: white;
  margin-top: 12px;
}

.secondary {
  background: #8e8e93;
}

/* Lock screen */
#lock {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

<body>
<div id="lock">
  <div class="card">
    <h2>🔒 Locked</h2>
    <input id="pin" type="password" placeholder="Enter PIN" inputmode="numeric">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<div class="app">
  <h1>🗓 Work Log</h1>

  <div class="card">
    <label>Date</label>
    <input type="date" id="date">

    <label>Start</label>
    <input type="time" id="start">

    <label>End</label>
    <input type="time" id="end">

    <label>Hourly Wage (€)</label>
    <input type="number" id="wage" step="0.01">

    <button onclick="saveEntry()">Save / Update</button>
    <button class="secondary" onclick="exportPDF()">Export PDF</button>
  </div>

  <div class="card" id="monthly"></div>
  <div id="records"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const recordsKey = "workRecords";
let records = JSON.parse(localStorage.getItem(recordsKey)) || [];

/* ======================
   PIN + BIOMETRIC
====================== */
async function hash(text) {
  const buf = await crypto.subtle.digest(
    "SHA-256",
    new TextEncoder().encode(text)
  );
  return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2,'0')).join('');
}

async function unlock() {
  const pin = document.getElementById("pin").value;
  const stored = localStorage.getItem("pinHash");

  if (!stored) {
    localStorage.setItem("pinHash", await hash(pin));
    await maybeEnableBiometric();
    document.getElementById("lock").style.display = "none";
    return;
  }

  if (await hash(pin) === stored) {
    document.getElementById("lock").style.display = "none";
  } else {
    alert("Wrong PIN");
  }
}

async function maybeEnableBiometric() {
  if (!window.PublicKeyCredential) return;
  if (!confirm("Enable FaceID / TouchID?")) return;

  try {
    await navigator.credentials.create({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        rp: { name: "Work Log" },
        user: {
          id: crypto.getRandomValues(new Uint8Array(16)),
          name: "telegram",
          displayName: "Telegram User"
        },
        pubKeyCredParams: [{ type: "public-key", alg: -7 }],
        authenticatorSelection: {
          authenticatorAttachment: "platform",
          userVerification: "required"
        }
      }
    });
    localStorage.setItem("biometric", "1");
  } catch {}
}

async function biometricUnlock() {
  if (!localStorage.getItem("biometric")) return false;
  try {
    await navigator.credentials.get({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        userVerification: "required"
      }
    });
    return true;
  } catch { return false; }
}

(async () => {
  if (await biometricUnlock()) {
    document.getElementById("lock").style.display = "none";
  }
})();

/* ======================
   WORK LOG
====================== */
function saveEntry() {
  const date = dateInput.value;
  const start = startInput.value;
  const end = endInput.value;
  const wage = parseFloat(wageInput.value);
  if (!date || !start || !end || !wage) return;

  const hours = (new Date(`1970-01-01T${end}`) - new Date(`1970-01-01T${start}`)) / 3600000;
  const pay = hours * wage;

  records = records.filter(r => r.id !== date);
  records.push({
    id: date,
    date,
    start,
    end,
    hours,
    wage,
    pay,
    month: date.slice(0,7)
  });

  localStorage.setItem(recordsKey, JSON.stringify(records));
  render();
}

function render() {
  /* Monthly totals */
  const totals = {};
  records.forEach(r => totals[r.month] = (totals[r.month] || 0) + r.pay);

  monthly.innerHTML = "<strong>📆 Monthly Earnings</strong><br>" +
    Object.entries(totals)
    .map(([m,v]) => `${m}: €${v.toFixed(2)}`)
    .join("<br>");

  records.sort((a,b) => b.date.localeCompare(a.date));
  recordsDiv = document.getElementById("records");
  recordsDiv.innerHTML = "";

  records.forEach(r => {
    const d = document.createElement("div");
    d.className = "card";
    d.innerHTML = `
      <strong>${r.date}</strong><br>
      ${r.start} → ${r.end}<br>
      ⏳ ${r.hours.toFixed(2)}h × €${r.wage}<br>
      💰 €${r.pay.toFixed(2)}
    `;
    recordsDiv.appendChild(d);
  });
}

/* ======================
   PDF EXPORT
====================== */
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();
  let y = 10;

  pdf.text("Work & Earnings Report", 10, y);
  y += 10;

  records.forEach(r => {
    pdf.text(
      `${r.date} - ${r.hours.toFixed(2)}h × €${r.wage} = €${r.pay.toFixed(2)}`,
      10, y
    );
    y += 8;
  });

  pdf.save("work-log.pdf");
}

render();
</script>
</body>
</html>
